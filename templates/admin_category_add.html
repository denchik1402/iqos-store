{% extends "base.html" %}

{% block title %}Добавить категорию{% endblock %}

{% block content %}
<div class="admin-panel">
    <nav class="admin-breadcrumb mb-4">
        <a href="{{ url_for('admin', tab='categories') }}">← Категории</a>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">➕ Новая категория</h5>
        </div>
        <div class="card-body">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Название *</label>
                    <input type="text" name="name" class="form-control" required placeholder="Например: Стики TEREA">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Slug (URL)</label>
                    <input type="text" name="slug" class="form-control" placeholder="terea-sticks — латиница, без пробелов">
                    <small class="text-muted">Адрес страницы: /catalog/<em>slug</em>. Если пусто — создаётся из названия.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Описание категории</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Текст на странице каталога"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Meta Description (SEO)</label>
                    <input type="text" name="meta_description" class="form-control" maxlength="300">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Meta Keywords (SEO)</label>
                    <input type="text" name="meta_keywords" class="form-control" maxlength="300">
                </div>
                <hr>
                <button type="submit" class="btn btn-success">➕ Создать</button>
                <a href="{{ url_for('admin', tab='categories') }}" class="btn btn-outline-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
