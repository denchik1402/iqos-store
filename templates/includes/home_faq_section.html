{% if home_faq_items %}
<section class="home-faq mb-5 lux-section lux-reveal" aria-label="Частые вопросы">
    <header class="lux-section-header home-faq-header">
        <div>
            <span class="lux-section-label">FAQ</span>
            <h2 class="lux-section-title">Частые <em>вопросы</em></h2>
            <p class="home-faq-lead mb-0">Выбор устройства, доставка и оформление заказа</p>
        </div>
    </header>
    <div class="accordion accordion-flush" id="homeFaqAccordion">
        {% for item in home_faq_items %}
        <div class="accordion-item border-0">
            <h3 class="accordion-header" id="faq-h-{{ loop.index }}">
                <button class="accordion-button {% if not loop.first %}collapsed{% endif %}" type="button" data-bs-toggle="collapse" data-bs-target="#faq-c-{{ loop.index }}" aria-expanded="{{ 'true' if loop.first else 'false' }}">
                    {{ item.q }}
                </button>
            </h3>
            <div id="faq-c-{{ loop.index }}" class="accordion-collapse collapse {% if loop.first %}show{% endif %}" data-bs-parent="#homeFaqAccordion">
                <div class="accordion-body">{{ item.a }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
    <p class="home-faq-footer mb-0">
        <a href="{{ url_for('faq') }}">Полный раздел FAQ →</a>
    </p>
</section>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in home_faq_items %}
    {
      "@type": "Question",
      "name": {{ item.q|tojson }},
      "acceptedAnswer": {"@type": "Answer", "text": {{ item.a|tojson }}}
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
{% endif %}
