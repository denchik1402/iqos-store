name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            set -o pipefail
            # Деплой под root — без sudo (SSH_USER=root в секретах GitHub)
            echo "=== 1. chown lilstore ==="
            rm -f /home/lilstore/my_shop/gunicorn.ctl 2>/dev/null || true
            find /home/lilstore/my_shop -xtype l -delete 2>/dev/null || true
            chown -hR lilstore:lilstore /home/lilstore/my_shop
            echo "=== 2. git pull ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && git config --global --add safe.directory /home/lilstore/my_shop && git fetch origin main && git reset --hard origin/main && git clean -fd alembic/versions/'
            echo "=== 3. pip install ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && pip install -r requirements.txt --quiet'
            echo "=== 4. migrations ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && python3 -c "
            from app import app
            from alembic_runner import run_alembic
            with app.app_context():
                run_alembic()
            " || python3 init_db.py'
            echo "=== 4b. repair_schema ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && python3 repair_schema.py'
            echo "=== 5. update_product_galleries ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && python3 update_product_galleries.py' 2>/dev/null || true
            echo "=== 5b. fill_seo_meta ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && python3 fill_seo_meta.py' 2>/dev/null || true
            echo "=== 5c. normalize_product_names ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && python3 normalize_product_names.py' 2>/dev/null || true
            echo "=== 5e. seed_seo_blog ==="
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && python3 seed_seo_blog.py' 2>/dev/null || true
            echo "=== 6. chown: www-data (static), lilstore (uploads) ==="
            chown -R www-data:www-data /home/lilstore/my_shop/static
            find /home/lilstore/my_shop/static -type d -exec chmod 755 {} \;
            find /home/lilstore/my_shop/static -type f -exec chmod 644 {} \;
            mkdir -p /home/lilstore/my_shop/static/images/banners
            mkdir -p /home/lilstore/my_shop/static/images/products
            mkdir -p /home/lilstore/my_shop/static/images/blog/covers
            mkdir -p /home/lilstore/my_shop/static/images/blog/posts
            mkdir -p /home/lilstore/my_shop/static/images/categories
            chown -R lilstore:lilstore /home/lilstore/my_shop/static/images/banners
            chown -R lilstore:lilstore /home/lilstore/my_shop/static/images/products
            chown -R lilstore:lilstore /home/lilstore/my_shop/static/images/blog
            chown -R lilstore:lilstore /home/lilstore/my_shop/static/images/categories
            chmod -R a+rX /home/lilstore/my_shop/static/images/categories
            find /home/lilstore/my_shop/static/images/banners -type d -exec chmod 755 {} \;
            find /home/lilstore/my_shop/static/images/products -type d -exec chmod 755 {} \;
            find /home/lilstore/my_shop/static/images/blog -type d -exec chmod 755 {} \;
            find /home/lilstore/my_shop/static/images/categories -type d -exec chmod 755 {} \;
            echo "=== 6b. nginx + gunicorn unit + healthcheck ==="
            cp /home/lilstore/my_shop/deploy/nginx-lilstore.conf /etc/nginx/sites-available/lilstore
            cp /home/lilstore/my_shop/deploy/lilstore.service /etc/systemd/system/lilstore.service
            systemctl daemon-reload
            nginx -t
            systemctl reload nginx
            cp /home/lilstore/my_shop/deploy/healthcheck_lilstore.sh /usr/local/bin/healthcheck_lilstore.sh
            chmod +x /usr/local/bin/healthcheck_lilstore.sh
            echo "=== 7. restart services ==="
            systemctl restart lilstore lilstore-bot
            echo "=== 7b. optimize_images (background, не блокирует деплой) ==="
            mkdir -p /home/lilstore/logs
            chown lilstore:lilstore /home/lilstore/logs
            sudo -u lilstore bash -c 'cd /home/lilstore/my_shop && source venv/bin/activate && ( flock -n 9 || { echo "optimize_images уже выполняется — пропуск"; exit 0; }; exec python3 optimize_images.py ) 9>/tmp/lilstore_optimize_images.lock >> /home/lilstore/logs/optimize_images.log 2>&1 &'
            echo "=== Deploy completed successfully ==="
